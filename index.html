<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldenAge Enterprise</title>

    <style>
        /* Remove default spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Make body full screen */
        html,
        body {
            height: 100%;
            width: 100%;
        }

        /* Make image full screen */
        img {
            width: 100vw;

            object-fit: cover;
            /* Image full cover karega without distortion */
            display: block;
        }
    </style>

</head>

<body>
    <img src="Goldenage Enterprise Layout.png" alt="Goldenage Enterprise">
</body>

</html>
